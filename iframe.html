<!DOCTYPE html>
<html>
<head>
    <title>Iframe Example</title>
</head>
<body align="center">
    <h2>Images in Iframes </h2>

    <!-- First horizontal line -->
    <hr>

    <table border="0" cellspacing="20">
        <tr>
            <!-- First image -->
            <td>
                <iframe src="https://www.wikipedia.org"
                        title="Bird Image"
                        width="400"
                        height="300"
                        style="border:2px solid black;">
                </iframe>
            </td>

            <!-- First vertical line -->
            <td>
                <div style=></div>
            </td>

            <!-- Second image -->
            <td>
                <iframe src="https://www.google.com/maps?q=Pune,India&output=embed"
                        title="Mountain Image"
                        width="400"
                        height="300"
                        style="border:2px solid black;">
                </iframe>
            </td>

            <!-- Second vertical line -->
            <td>
                <div style="border-left:2px solid gray; height:300px;"></div>
            </td>

            <!-- Third image -->
            <td>
                <iframe src="https://me.dypgroup.edu.in/applicantLogins.htm?link=2945b6a56d27bcd6f0bfa1177c6a9ee2"
                        title="Tea Leaves Image"
                        width="400"
                        height="300"
                        style="border:2px solid black;">
                </iframe>
            </td>

            <!-- Third vertical line -->
            <td>
                <div style="border-left:2px solid gray; height:300px;"></div>
            </td>
        </tr>
    </table>

    <!-- Second horizontal line -->
    <hr>
</body>
</html>
